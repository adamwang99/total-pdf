name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: Total-PDF-x86_64-linux.AppImage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: Total-PDF-x86_64-windows.msi
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: Total-PDF-x86_64-darwin.dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: Total-PDF-aarch64-darwin.dmg
    
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "25"
      
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build frontend (npm)
        run: |
          cd frontend
          npm ci
          npm run build
      
      - name: Build backend JAR (Gradle)
        run: |
          cd app/core
          ./gradlew :total-pdf:bootJar
      
      - name: Build Tauri app
        run: |
          cd frontend/editor
          npx tauri build
      
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: frontend/editor/src-tauri/target/release/bundle/**/*
  
  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: "Total PDF ${{ github.ref_name }}"
          body: |
            ## Total PDF ${{ github.ref_name }}
            
            ### Platforms
            - macOS ARM64 (Apple Silicon)
            - macOS Intel (x86_64)
            - Linux (x86_64)
            - Windows (x86_64)
          draft: false
          prerelease: false
          artifacts: "artifacts/**/*"
          token: ${{ secrets.GITHUB_TOKEN }}
