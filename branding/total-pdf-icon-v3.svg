<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0060f0"/>
      <stop offset="1" stop-color="#00d0d0"/>
    </linearGradient>
  </defs>

  <!-- square frame, rounded, outline only, folded top-right corner -->
  <path d="M120 96
           h212
           l84 84
           v236
           a24 24 0 0 1 -24 24
           h-248
           a24 24 0 0 1 -24 -24
           v-296
           a24 24 0 0 1 24 -24 z"
        fill="none" stroke="url(#g)" stroke-width="34" stroke-linejoin="round"/>
  <!-- folded corner fill cut: draw the diagonal of the fold -->
  <path d="M332 96 l84 84 h-60 a24 24 0 0 1 -24 -24 z"
        fill="none" stroke="url(#g)" stroke-width="34" stroke-linejoin="round"/>

  <!-- closed circle = Total / complete -->
  <circle cx="256" cy="300" r="86" fill="none" stroke="url(#g)" stroke-width="34"/>
</svg>
