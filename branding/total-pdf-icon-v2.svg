<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- rounded dark tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <!-- A4 page body, modern rounded, folded top-right corner -->
  <path d="M148 120
           h150
           l66 66
           v206
           a24 24 0 0 1 -24 24
           h-192
           a24 24 0 0 1 -24 -24
           v-248
           a24 24 0 0 1 24 -24 z" fill="#ffffff"/>
  <!-- folded corner -->
  <path d="M298 120 l66 66 h-46 a20 20 0 0 1 -20 -20 z" fill="#cbd5e1"/>

  <!-- closed circle = Total / complete -->
  <circle cx="244" cy="296" r="64" fill="none" stroke="url(#ring)" stroke-width="22"/>
</svg>
